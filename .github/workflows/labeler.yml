name: Automated Issue & PR Labeler

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label Issues
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];
            if (title.includes('bug') || title.includes('fix')) labels.push('bug');
            if (title.includes('feat') || title.includes('enhancement')) labels.push('enhancement');
            if (title.includes('docs') || title.includes('documentation')) labels.push('documentation');
            if (title.includes('elusoc')) labels.push('ELUSoC-2026');
            if (labels.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }

      - name: Label Pull Requests
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];
            if (title.includes('bug') || title.includes('fix')) labels.push('bug');
            if (title.includes('feat') || title.includes('enhancement')) labels.push('enhancement');
            if (title.includes('docs') || title.includes('documentation')) labels.push('documentation');
            if (labels.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }
