name: CI - Tests

on:
  push:
    branches: [master, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [master, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-interview-platform

    strategy:
      matrix:
        node-version: [18.x, 20.x]
      fail-fast: false

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'ai-interview-platform/package-lock.json'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Lint check
        run: npx eslint . --ext .js --max-warnings 50
        continue-on-error: true

      - name: Run server tests
        run: npm test -- --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-jwt-secret-for-ci
          ALLOWED_ORIGINS: http://localhost:3000

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: ai-interview-platform/coverage/
          retention-days: 7

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-interview-platform/client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: 'ai-interview-platform/client/package-lock.json'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Build client
        run: npm run build
        env:
          CI: true
          VITE_API_URL: http://localhost:5000/api

      - name: Run client tests
        run: npm test -- --watchAll=false --passWithNoTests
        continue-on-error: true
        env:
          CI: true