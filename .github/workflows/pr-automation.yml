name: CI - PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  pr-checks:
    name: PR Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qE '^(feat|fix|chore|docs|refactor|test|ci|perf):'; then
            echo "PR title follows conventional commit format"
          else
            echo "::warning::PR title should follow conventional commit format (feat:, fix:, chore:, etc.)"
          fi

      - name: Validate branch name
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if echo "$BRANCH" | grep -qE '^(feat|fix|chore|docs|refactor|test|ci)/'; then
            echo "Branch name follows convention: $BRANCH"
          else
            echo "::warning::Branch name should follow convention (feat/, fix/, chore/, etc.)"
          fi

      - name: File count check
        run: |
          COUNT=$(git diff --name-only HEAD~1..HEAD 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 30 ]; then
            echo "::warning::Large PR detected ($COUNT files). Consider splitting into smaller PRs."
          else
            echo "PR modifies $COUNT files - acceptable size"
          fi
        shell: bash

  pr-labeler:
    name: Auto-label PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  size-label:
    name: Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: pascalgn/size-label-action@v0.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          sizes: >
            {"XS": 10, "S": 30, "M": 100, "L": 500, "XL": 1000}